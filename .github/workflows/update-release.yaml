name: Check and Build New Snapcast Release

on:
  schedule:
    - cron: "0 0 * * *" # Check daily at midnight
  workflow_dispatch: # Allow manual triggering
    inputs:
      version:
        description: "Specific Snapcast version to build (e.g. 0.28.0). Leave empty to automatically fetch latest."
        required: false
        type: string

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push config.yaml changes back to the repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get target Snapcast release version
        id: get_version
        run: |
          MANUAL_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$MANUAL_VERSION" ]; then
            # Use the manually provided version, stripping 'v' if accidentally included
            VERSION=${MANUAL_VERSION#v}
            echo "Manual version specified: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            # Fetch latest dynamically
            LATEST_TAG=$(curl -sL https://api.github.com/repos/badaix/snapcast/releases/latest | jq -r .tag_name)
            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
              echo "Failed to get the latest release tag"
              exit 1
            fi
            
            # Remove 'v' prefix using parameter expansion, e.g. v0.27.0 -> 0.27.0
            VERSION=${LATEST_TAG#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Latest release found: $VERSION"
          fi

      - name: Check if version already published
        id: check_published
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Read current version from config.yaml
          CURRENT_VERSION=$(grep "^version:" snapclient/config.yaml | sed 's/version: //')

          if [ "$VERSION" == "$CURRENT_VERSION" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already in config.yaml. Stopping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not published yet, proceeding with update."
            
            # Additional pre-check to gracefully exit if Alpine Edge doesn't have the version yet
            ALPINE_PKG=$(curl -s "https://dl-cdn.alpinelinux.org/alpine/edge/community/armv7/" | grep -oE "snapcast-client-${VERSION}-r[0-9]+" || echo "not-found")
            if [ "$ALPINE_PKG" == "not-found" ]; then
                echo "Warning: Alpine edge repository does not have the snapcast-client package for version ${VERSION} yet."
                echo "Waiting for Alpine maintainers to publish it. Stopping gracefully."
                echo "exists=true" >> $GITHUB_OUTPUT
            else
                echo "Alpine edge has the package! Proceeding with update."
            fi
          fi

      - name: Update config.yaml version
        if: steps.check_published.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Replace the line starting with "version: " with the new snapcast version
          sed -i "s/^version: .*/version: $VERSION/" snapclient/config.yaml

      - name: Update CHANGELOG.md
        if: steps.check_published.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Prepend the new release information right under the #Changelog header
          sed -i "s/^#Changelog/#Changelog\n\n##${VERSION}\n- Upgrade version/" CHANGELOG.md

      - name: Update Dockerfile ARG
        if: steps.check_published.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Hardcode the version directly in the Dockerfile so local builds work
          sed -i "s/^ARG SNAPCAST_VERSION=.*/ARG SNAPCAST_VERSION=$VERSION/" snapclient/Dockerfile

      - name: Commit and push changes
        if: steps.check_published.outputs.exists == 'false'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Bump add-on version to ${{ steps.get_version.outputs.version }}"
          file_pattern: "snapclient/config.yaml CHANGELOG.md snapclient/Dockerfile"

      - name: Set up QEMU
        if: steps.check_published.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_published.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_published.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish new version to Docker Hub
        if: steps.check_published.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            sirtoby42/snapclient:latest
            sirtoby42/snapclient:${{ steps.get_version.outputs.version }}
          context: "{{defaultContext}}:snapclient"
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:stable
            SNAPCAST_VERSION=${{ steps.get_version.outputs.version }}
          platforms: linux/arm/v7,linux/amd64,linux/arm64
